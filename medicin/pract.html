<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- custom css file link  -->
    <link rel="stylesheet" href="pract.css">
    <style>
        /* Additional CSS for popup */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 20px;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 9998;
        }
      
    </style>
</head>
<body>

<div class="container">

    <form action="">

        <div class="row">

            <div class="col">

                <h3 class="title">billing address</h3>

                <div class="inputBox">
                    <span>full name :</span>
                    <input type="text" placeholder="john deo">
                </div>
                <div class="inputBox">
                    <span>email :</span>
                    <input type="email" placeholder="example@example.com">
                </div>
                <div class="inputBox">
                    <span>address :</span>
                    <input type="text" placeholder="room - street - locality">
                </div>
                <div class="inputBox">
                    <span>city :</span>
                    <input type="text" placeholder="mumbai">
                </div>

                <div class="flex">
                    <div class="inputBox">
                        <span>state :</span>
                        <input type="text" placeholder="india">
                    </div>
                    <div class="inputBox">
                        <span>zip code :</span>
                        <input type="text" placeholder="123 456">
                    </div>
                </div>

            </div>

            <div class="col">

                <h3 class="title">payment</h3>

                <div class="inputBox">
                    <span>QR code for payment :</span>
                    <img src="scanner.jpeg" alt="">
                </div>
               

                <div class="flex">
                    <div class="inputBox">
                        <span>exp year :</span>
                        <input type="number" placeholder="2022">
                    </div>
                    <div class="inputBox">
                        <span>CVV :</span>
                        <input type="text" placeholder="1234">
                    </div>
                </div>

            </div>
    
        </div>

        <input type="submit" value="proceed to checkout" class="submit-btn">

    </form>
    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <p>Thank you for your order! Your purchase has been successfully processed.</p>
    </div>
</div>    
<script>
   // Get the checkout form and popup elements
   const checkoutForm = document.getElementById('checkout-form');
    const overlay = document.getElementById('overlay');
    const popup = document.getElementById('popup');

    // Event listener for form submission
    checkoutForm.addEventListener('submit', function(event) {
        // Prevent the default form submission
        event.preventDefault();

        // Display the popup
        overlay.style.display = 'block';
        popup.style.display = 'block';

        // Optionally, you can reset the form fields after a delay
        // setTimeout(() => {
        //     checkoutForm.reset();
        // }, 3000);
    });

// Close the popup when clicking on the overlay
overlay.addEventListener('click', function() {
    overlay.style.display = 'none';
    popup.style.display = 'none';
});
</script>
</body>
</html>
